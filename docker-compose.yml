version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: edunest-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DATABASE_PASSWORD:-12345}
      MYSQL_DATABASE: edunest
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - edunest-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ghcr.io/mooraa86/edunest-backend:latest
    container_name: edunest-app
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:mysql://mysql:3306/edunest?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - edunest-network
    volumes:
      - uploads-data:/app/uploads

volumes:
  mysql-data:
  uploads-data:

networks:
  edunest-network:
    driver: bridge
