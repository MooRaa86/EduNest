<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Confirm Account Deletion</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f5f5f5; padding: 20px;">

<div style="max-width: 500px; margin: auto; background: #ffffff; padding: 30px; border-radius: 8px; text-align: center;">

    <h2 style="color: #d9534f;">Change Email  Request</h2>

    <p style="font-size: 14px; color: #555;">
        Please use the OTP below to confirm email change.:
    </p>

    <div style="font-size: 26px; font-weight: bold; letter-spacing: 4px; margin: 20px 0; color: #333;">
        {{otp}}
    </div>

    <p style="font-size: 13px; color: #888;">
        This code will expire in 2 minutes.
    </p>

    <hr style="margin: 20px 0;">

    <p style="font-size: 12px; color: #999;">
       If you did not request this, please ignore this email.
    </p>

</div>

</body>
</html>
