
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduNest</title>
</head>

<body style="margin:0;padding:0;background:#e8eef8;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;">

<table width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#e8eef8;padding:40px 0;">
    <tr>
        <td align="center">

            <table width="560" cellpadding="0" cellspacing="0" border="0"
                   style="max-width:560px;width:100%;">

                <!-- TOP ACCENT -->
                <tr>
                    <td style="height:5px;background:#3a8fd4;border-radius:4px 4px 0 0;"></td>
                </tr>

                <!-- HEADER -->
                <tr>
                    <td style="background:#1b3560;padding:32px 40px;">

                        <table width="100%" cellpadding="0" cellspacing="0" border="0">
                            <tr>

                                <!-- ICON -->
                                <td width="72" valign="middle">

                                    <div style="
                                        width:58px;
                                        height:58px;
                                        background:#ffffff;
                                        border-radius:14px;
                                        text-align:center;
                                        line-height:58px;
                                        font-size:28px;
                                        box-shadow:0 4px 18px rgba(0,0,0,.2);
                                    ">
                                        🎓
                                    </div>

                                </td>

                                <!-- HEADER TEXT -->
                                <td valign="middle" style="padding-left:18px;">

                                    <p style="
                                        margin:0 0 5px;
                                        font-size:10px;
                                        letter-spacing:3px;
                                        text-transform:uppercase;
                                        color:rgba(255,255,255,.45);
                                        font-weight:700;">
                                        EduNest
                                    </p>

                                    <h1 style="
                                        margin:0;
                                        font-family:Georgia,serif;
                                        font-size:30px;
                                        line-height:1.2;
                                        color:#ffffff;
                                        font-weight:700;">
                                        A Message<br>
                                        from EduNest
                                    </h1>

                                </td>

                            </tr>
                        </table>

                    </td>
                </tr>

                <!-- BODY -->
                <tr>
                    <td style="background:#ffffff;padding:38px 40px 30px;">

                        <p style="
                            margin:0 0 4px;
                            font-size:10px;
                            font-weight:700;
                            letter-spacing:2px;
                            text-transform:uppercase;
                            color:#7b8eab;">
                            Message For
                        </p>

                        <p style="
                            margin:0 0 22px;
                            font-family:Georgia,serif;
                            font-size:28px;
                            font-style:italic;
                            color:#1b3560;">
                            {{name}},
                        </p>

                        <p style="
                            margin:0 0 26px;
                            font-size:14px;
                            line-height:1.8;
                            color:#6b7e9b;">
                            We would like to share the following update with you.
                        </p>


                        <!-- MESSAGE CARD -->
                        <table width="100%" cellpadding="0" cellspacing="0" border="0"
                               style="margin-bottom:30px;">
                            <tr>
                                <td style="
            background:#f8fbff;
            border:1px solid #dbe7f7;
            border-left:5px solid #2559b3;
            border-radius:14px;
            padding:28px 30px;
            box-shadow:0 4px 12px rgba(15,23,42,.04);
        ">

                                    <p style="
                margin:0 0 16px;
                font-size:11px;
                font-weight:700;
                letter-spacing:2.5px;
                text-transform:uppercase;
                color:#2559b3;">
                                        ✦ EduNest Message
                                    </p>

                                    <div style="
                font-family:'Segoe UI',Arial,sans-serif;
                font-size:16px;
                font-weight:400;
                line-height:2;
                letter-spacing:0.15px;
                color:#475569;
                white-space:pre-line;
            ">
                                        {{message}}
                                    </div>

                                </td>
                            </tr>
                        </table>



                        <!-- DIVIDER -->
                        <table width="100%" cellpadding="0" cellspacing="0" border="0"
                               style="margin-bottom:22px;">
                            <tr>
                                <td style="height:1px;background:#dce5f2;"></td>
                            </tr>
                        </table>

                        <p style="margin:0;font-size:13px;color:#7b8eab;">
                            Have a nice day,
                        </p>

                        <p style="
                            margin:5px 0 0;
                            font-size:15px;
                            font-weight:700;
                            color:#1b3560;">
                            EduNest Team
                        </p>

                    </td>
                </tr>

                <!-- FOOTER -->
                <tr>
                    <td style="
                        background:#f0f5fd;
                        border-top:1px solid #dce5f2;
                        padding:18px 40px;
                        border-radius:0 0 4px 4px;">

                        <table width="100%" cellpadding="0" cellspacing="0" border="0">
                            <tr>

                                <td style="
                                    font-size:11px;
                                    color:#a4b0c6;
                                    line-height:1.6;">
                                    © 2026 EduNest. All rights reserved.
                                </td>

                                <td align="right" style="
                                    font-size:11px;
                                    color:#a4b0c6;">
                                    Empowering learners everywhere.
                                </td>

                            </tr>
                        </table>

                    </td>
                </tr>

            </table>

        </td>
    </tr>
</table>

</body>
</html>
